<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Vidhyatantra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#1E3A8A', accent: '#F97316', success: '#22C55E', cream: '#FFF7E6' } } } }
    </script>
    <style> body { animation: fadeIn 0.8s ease-in-out; } @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } } </style>
</head>
<body class="bg-cream min-h-screen flex items-center justify-center p-6">
    <div class="bg-white p-10 rounded-[2.5rem] shadow-xl w-full max-w-md border border-blue-50">
        
        <button onclick="window.location.href='login.html'" class="text-gray-400 hover:text-primary mb-6 flex items-center font-bold transition-colors">
            ← Back to Login
        </button>

        <h2 class="text-3xl font-extrabold text-primary mb-2">Reset Password</h2>
        <p class="text-gray-500 mb-8 font-medium">Enter the email you registered with, and we will send you a secure link.</p>

        <div id="alertBox" class="hidden px-4 py-3 rounded-xl mb-6 text-sm font-medium text-center border"></div>

        <form id="resetForm" class="space-y-5">
            <div>
                <label class="block text-primary font-bold mb-2">Email</label>
                <input type="email" id="email" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-primary bg-gray-50">
            </div>
            
            <button type="submit" id="sendBtn" class="w-full bg-primary text-white font-bold text-lg py-4 rounded-2xl shadow-lg hover:bg-blue-900 transition-transform hover:-translate-y-1 mt-4">Send Reset Link</button>
        </form>
    </div>

    <script>
        const SUPABASE_URL = 'https://pvkdqyuflatwfydowzvq.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2a2RxeXVmbGF0d2Z5ZG93enZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NzQzMzAsImV4cCI6MjA5MDQ1MDMzMH0.meJSpnkFRKbpq32erE_2bgP-7wonIQX-00ArkrRCu4s';
        
        function showAlert(message, isSuccess = false) {
            const alertBox = document.getElementById('alertBox');
            alertBox.innerText = message;
            alertBox.className = `px-4 py-3 rounded-xl mb-6 text-sm font-medium text-center border ${isSuccess ? 'bg-green-50 border-green-200 text-green-700' : 'bg-red-50 border-red-200 text-red-600'}`;
            alertBox.classList.remove('hidden');
        }

        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const btn = document.getElementById('sendBtn');
            
            btn.innerText = "Sending...";
            btn.disabled = true;

            try {
                if (!window.supabase) throw new Error("Database connection failed.");
                const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                
                // Set the URL to your update page
                let redirectUrl = window.location.href.replace('forgot-password.html', 'update-password.html');

                const { error } = await supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: redirectUrl,
                });

                if (error) throw error;

                // The Hacker-Proof Message
                showAlert("If an account exists with this email, a reset link has been sent. Please check your inbox.", true);
                btn.innerText = "Link Sent";

            } catch (err) {
                showAlert(err.message);
                btn.innerText = "Send Reset Link";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
