<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Password - Vidhyatantra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#1E3A8A', accent: '#F97316', success: '#22C55E', cream: '#FFF7E6' } } } }
    </script>
    <style> body { animation: fadeIn 0.8s ease-in-out; } @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } } </style>
</head>
<body class="bg-cream min-h-screen flex items-center justify-center p-6">
    <div class="bg-white p-10 rounded-[2.5rem] shadow-xl w-full max-w-md border border-blue-50">
        
        <h2 class="text-3xl font-extrabold text-primary mb-2">Create New Password</h2>
        <p class="text-gray-500 mb-8 font-medium">Please enter your new password below.</p>

        <div id="alertBox" class="hidden px-4 py-3 rounded-xl mb-6 text-sm font-medium text-center border"></div>

        <form id="updateForm" class="space-y-5">
            <div>
                <label class="block text-primary font-bold mb-2">New Password</label>
                <div class="relative">
                    <input type="password" id="newPassword" required minlength="6" class="w-full px-4 py-3 pr-12 rounded-xl border border-gray-200 focus:outline-none focus:border-primary bg-gray-50">
                    <button type="button" onclick="togglePassword('newPassword', 'eye1')" class="absolute right-4 top-3 text-xl text-gray-400 hover:text-primary transition-colors focus:outline-none">
                        <span id="eye1">👁️</span>
                    </button>
                </div>
            </div>
            <div>
                <label class="block text-primary font-bold mb-2">Confirm New Password</label>
                <div class="relative">
                    <input type="password" id="confirmPassword" required minlength="6" class="w-full px-4 py-3 pr-12 rounded-xl border border-gray-200 focus:outline-none focus:border-primary bg-gray-50">
                    <button type="button" onclick="togglePassword('confirmPassword', 'eye2')" class="absolute right-4 top-3 text-xl text-gray-400 hover:text-primary transition-colors focus:outline-none">
                        <span id="eye2">👁️</span>
                    </button>
                </div>
            </div>
            
            <button type="submit" id="saveBtn" class="w-full bg-success text-white font-bold text-lg py-4 rounded-2xl shadow-lg hover:bg-green-600 transition-transform hover:-translate-y-1 mt-4">Save Password</button>
        </form>
    </div>

    <script>
        const SUPABASE_URL = 'https://pvkdqyuflatwfydowzvq.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2a2RxeXVmbGF0d2Z5ZG93enZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NzQzMzAsImV4cCI6MjA5MDQ1MDMzMH0.meJSpnkFRKbpq32erE_2bgP-7wonIQX-00ArkrRCu4s';
        
        window.addEventListener('DOMContentLoaded', () => {
            if (!window.location.hash || !window.location.hash.includes('type=recovery')) {
                document.getElementById('updateForm').innerHTML = `
                    <div class="text-center py-6">
                        <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center text-red-600 text-3xl mx-auto mb-4">❌</div>
                        <p class="text-red-600 font-extrabold text-xl mb-2">Unauthorized Access</p>
                        <p class="text-gray-600 mb-8 font-medium">You can only access this page by clicking the secure link sent to your email.</p>
                        <button onclick="window.location.href='forgot-password.html'" class="w-full bg-primary text-white font-bold py-4 rounded-xl hover:bg-blue-900 transition-transform shadow-md">Go to Password Reset</button>
                    </div>
                `;
            }
        });

        function togglePassword(inputId, eyeId) {
            const input = document.getElementById(inputId);
            const eye = document.getElementById(eyeId);
            if (input.type === "password") { input.type = "text"; eye.innerText = "🙈"; } 
            else { input.type = "password"; eye.innerText = "👁️"; }
        }

        function showAlert(message, isSuccess = false) {
            const alertBox = document.getElementById('alertBox');
            alertBox.innerText = message;
            alertBox.className = `px-4 py-3 rounded-xl mb-6 text-sm font-medium text-center border ${isSuccess ? 'bg-green-50 border-green-200 text-green-700' : 'bg-red-50 border-red-200 text-red-600'}`;
            alertBox.classList.remove('hidden');
        }

        document.getElementById('updateForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('saveBtn');

            if (newPassword !== confirmPassword) {
                showAlert("Passwords do not match.");
                return;
            }

            btn.innerText = "Saving...";
            btn.disabled = true;

            try {
                if (!window.supabase) throw new Error("Database connection failed.");
                const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                
                const { error } = await supabase.auth.updateUser({ password: newPassword });

                // Link Expiry & Error Handling
                if (error) {
                    if (error.message.includes("session missing") || error.message.includes("expired")) {
                        throw new Error("This reset link has expired or is invalid. Please request a new one.");
                    } else {
                        throw error;
                    }
                }

                showAlert("Password updated successfully! Redirecting to login...", true);
                setTimeout(() => { window.location.href = "login.html"; }, 2500);

            } catch (err) {
                showAlert(err.message);
                btn.innerText = "Save Password";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
