<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Connection Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen p-6">
    
    <div class="bg-white p-10 rounded-3xl shadow-xl w-full max-w-md text-center border border-gray-200">
        <div class="w-16 h-16 bg-blue-900 rounded-2xl flex items-center justify-center text-white font-bold text-3xl mx-auto mb-6 shadow-lg">?</div>
        
        <h2 class="text-2xl font-extrabold text-blue-900 mb-2">Supabase Test</h2>
        <p class="text-gray-500 mb-8">Pinging your database...</p>

        <div id="statusBox" class="p-4 rounded-xl font-bold text-lg bg-gray-100 text-gray-600 animate-pulse">
            Testing Connection...
        </div>
        
        <p id="errorMessage" class="text-sm text-red-500 mt-4 hidden"></p>
    </div>

    <script>
        // Your exact credentials
        const SUPABASE_URL = 'https://pvkdqyuflatwfydowzvq.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2a2RxeXVmbGF0d2Z5ZG93enZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NzQzMzAsImV4cCI6MjA5MDQ1MDMzMH0.meJSpnkFRKbpq32erE_2bgP-7wonIQX-00ArkrRCu4s';
        
        async function runDiagnostic() {
            const statusBox = document.getElementById('statusBox');
            const errorMessage = document.getElementById('errorMessage');

            try {
                // 1. Check if the Supabase library loaded from the internet
                if (!window.supabase) {
                    throw new Error("Could not load the Supabase library. Check your Wi-Fi or adblocker.");
                }

                const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

                // 2. Ping the 'profiles' table to see if the database responds
                const { data, error } = await supabase.from('profiles').select('id').limit(1);

                if (error) {
                    throw error;
                }

                // If we reach here, the connection is perfect!
                statusBox.classList.remove('bg-gray-100', 'text-gray-600', 'animate-pulse');
                statusBox.classList.add('bg-green-100', 'text-green-700', 'border', 'border-green-300');
                statusBox.innerHTML = "✅ CONNECTED SUCCESSFULLY!";
                document.querySelector('.bg-blue-900').classList.replace('bg-blue-900', 'bg-green-500');
                document.querySelector('.bg-green-500').innerText = "✓";

            } catch (err) {
                // If anything fails, it stops and prints the exact error
                statusBox.classList.remove('bg-gray-100', 'text-gray-600', 'animate-pulse');
                statusBox.classList.add('bg-red-100', 'text-red-700', 'border', 'border-red-300');
                statusBox.innerHTML = "❌ CONNECTION FAILED";
                
                errorMessage.innerText = "Error Details: " + err.message;
                errorMessage.classList.remove('hidden');
                
                document.querySelector('.bg-blue-900').classList.replace('bg-blue-900', 'bg-red-500');
                document.querySelector('.bg-red-500').innerText = "!";
            }
        }

        // Run the test 1.5 seconds after the page loads so you can see it working
        setTimeout(runDiagnostic, 1500);
    </script>
</body>
</html>
