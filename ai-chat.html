<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Doubt Solver - Vidyatantra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#1E3A8A', accent: '#F97316', success: '#22C55E', premium: '#8B5CF6', dark: '#0B1120' } } } }
    </script>
    <style>
        body { background-color: #0B1120; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(30, 58, 138, 0.15); backdrop-filter: blur(12px); border: 1px solid rgba(139, 92, 246, 0.3); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); }
        .neon-glow { text-shadow: 0 0 10px rgba(249, 115, 22, 0.7); }
        .chat-bubble-user { background: linear-gradient(135deg, #1E3A8A, #312e81); border-bottom-right-radius: 0; }
        .chat-bubble-ai { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); border-bottom-left-radius: 0; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(139, 92, 246, 0.5); border-radius: 10px; }
        
        .typing-indicator span { animation: blink 1.4s infinite both; height: 6px; width: 6px; background: #8B5CF6; border-radius: 50%; display: inline-block; margin: 0 2px; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0% { opacity: .2; } 20% { opacity: 1; } 100% { opacity: .2; } }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="glass-panel px-6 py-4 flex justify-between items-center z-20 sticky top-0">
        <button onclick="goBackToStory()" class="text-gray-400 hover:text-white flex items-center transition-colors font-bold">
            ← Back
        </button>
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 rounded-full border border-premium shadow-[0_0_15px_rgba(139,92,246,0.5)] flex items-center justify-center bg-primary text-white font-black text-xl">
                🤖
            </div>
            <div>
                <h1 class="text-xl font-extrabold text-white tracking-wider">Vidyatantra <span class="text-premium">CORE</span></h1>
                <p class="text-xs text-success font-mono tracking-widest flex items-center"><span class="w-2 h-2 rounded-full bg-success animate-pulse mr-2"></span> SYSTEM ONLINE</p>
            </div>
        </div>
        <div class="text-right">
            <p class="text-xs text-gray-400 font-bold uppercase tracking-widest">Doubts Left</p>
            <p class="text-xl font-black text-accent neon-glow" id="doubts-counter">--</p>
        </div>
    </header>

    <main class="flex-grow overflow-y-auto p-4 md:p-8 flex flex-col space-y-6" id="chat-container">
        <div class="flex justify-start">
            <div class="chat-bubble-ai max-w-[80%] md:max-w-[60%] p-4 rounded-2xl text-sm md:text-base text-gray-200 shadow-lg">
                <p class="font-bold text-premium mb-1">Vidyatantra AI</p>
                <p>Hello! I am your personal study guide. Ask me any question related to Math, Science, or History. Remember, keep it short!</p>
            </div>
        </div>
    </main>

    <footer class="p-4 md:p-6 bg-dark border-t border-gray-800 z-20">
        <div class="max-w-4xl mx-auto glass-panel rounded-3xl p-3 flex flex-col relative transition-all duration-300" id="input-wrapper">
            <div class="flex items-end">
                <textarea id="prompt-input" rows="2" placeholder="Ask your study question here..." 
                    class="w-full bg-transparent text-white placeholder-gray-500 focus:outline-none resize-none px-4 py-2 font-medium"
                    oninput="checkWordCount()"></textarea>
                
                <button id="send-btn" onclick="sendDoubt()" class="ml-2 mb-1 bg-premium hover:bg-purple-500 text-white rounded-2xl p-3 shadow-[0_0_15px_rgba(139,92,246,0.4)] transition-all transform hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 transform rotate-90" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                    </svg>
                </button>
            </div>
            <div class="flex justify-between items-center px-4 pt-2 border-t border-gray-700/50 mt-2">
                <span id="warning-text" class="text-xs font-bold text-red-500 opacity-0 transition-opacity">⚠️ Too long!</span>
                <span id="word-count" class="text-xs font-mono font-bold text-gray-400">0 / 40 WORDS</span>
            </div>
        </div>
    </footer>

    <script>
        const SUPABASE_URL = 'https://pvkdqyuflatwfydowzvq.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2a2RxeXVmbGF0d2Z5ZG93enZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NzQzMzAsImV4cCI6MjA5MDQ1MDMzMH0.meJSpnkFRKbpq32erE_2bgP-7wonIQX-00ArkrRCu4s';
        
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let sessionData = null;
        let userProfile = null;
        let doubtsRemaining = 0;

        const inputField = document.getElementById('prompt-input');
        const sendBtn = document.getElementById('send-btn');
        const wordCountDisplay = document.getElementById('word-count');
        const warningText = document.getElementById('warning-text');
        const wrapper = document.getElementById('input-wrapper');
        const chatContainer = document.getElementById('chat-container');

        async function initAuth() {
            const { data: { session }, error: sessionError } = await supabaseClient.auth.getSession();
            if (sessionError || !session) return window.location.replace("login.html");
            
            sessionData = session;
            const { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', session.user.id).single();
            userProfile = profile;

            const today = new Date();
            const todayStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
            const lastActiveStr = profile.last_active || null;

            let maxDoubts = profile.subscription_status === 'premium' ? 1000 : 1;
            let aiUsed = profile.daily_ai_count || 0;

            if (lastActiveStr !== todayStr && profile.subscription_status !== 'premium') {
                aiUsed = 0;
                await supabaseClient.from('profiles').update({ daily_ai_count: 0 }).eq('id', session.user.id);
            }

            doubtsRemaining = Math.max(0, maxDoubts - aiUsed);
            document.getElementById('doubts-counter').innerText = doubtsRemaining;

            if (doubtsRemaining <= 0) {
                inputField.disabled = true;
                inputField.placeholder = "Doubt limit reached. Upgrade to Premium for 1000 doubts!";
                sendBtn.disabled = true;
            } else {
                sendBtn.disabled = true;
            }
        }
        
        initAuth();

        function goBack() {
            let userClass = userProfile?.class || '8';
            window.location.href = `class${userClass}-dashboard.html`;
        }

        function checkWordCount() {
            let text = inputField.value.trim();
            let words = text === "" ? 0 : text.split(/\s+/).length;
            let chars = text.length; 
            
            wordCountDisplay.innerText = `${words} / 40 WORDS`;

            if (words > 40 || chars > 250) {
                wordCountDisplay.classList.replace('text-gray-400', 'text-red-500');
                wrapper.classList.add('border-red-500');
                warningText.innerText = chars > 250 
                    ? "⚠️ Text too long! Please keep your question brief." 
                    : "⚠️ Too long! Keep it under 40 words.";
                warningText.classList.remove('opacity-0');
                sendBtn.disabled = true;
            } else {
                wordCountDisplay.classList.replace('text-red-500', 'text-gray-400');
                wrapper.classList.remove('border-red-500');
                warningText.classList.add('opacity-0');
                sendBtn.disabled = (words === 0 || doubtsRemaining <= 0);
            }
        }

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            if (role === 'user') {
                div.innerHTML = `<div class="chat-bubble-user max-w-[80%] md:max-w-[60%] p-4 rounded-2xl text-sm md:text-base text-white shadow-lg"><p>${text}</p></div>`;
            } else if (role === 'typing') {
                div.id = 'typing-indicator';
                div.innerHTML = `<div class="chat-bubble-ai p-4 rounded-2xl shadow-lg flex items-center"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
            } else {
                div.innerHTML = `<div class="chat-bubble-ai max-w-[80%] md:max-w-[60%] p-4 rounded-2xl text-sm md:text-base text-gray-200 shadow-[0_0_15px_rgba(139,92,246,0.1)]"><p class="font-bold text-premium mb-1">Vidyatantra AI</p><p class="leading-relaxed">${text}</p></div>`;
            }
            
            chatContainer.appendChild(div);
            chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
        }

        async function sendDoubt() {
            const prompt = inputField.value.trim();
            if (!prompt || doubtsRemaining <= 0) return;

            appendMessage('user', prompt);
            inputField.value = '';
            checkWordCount();
            appendMessage('typing');
            inputField.disabled = true;

            try {
                const { data, error } = await supabaseClient.functions.invoke('ai-chat', {
                    body: { user_prompt: prompt }
                });

                const typingIndicator = document.getElementById('typing-indicator');
                if (typingIndicator) typingIndicator.remove();

                if (error) throw new Error(error.message);
                if (data && data.error) throw new Error(data.error);

                appendMessage('ai', data.reply);

                // Update the visual UI only (The server handles the actual database math!)
                userProfile.daily_ai_count = (userProfile.daily_ai_count || 0) + 1;
                doubtsRemaining -= 1;
                document.getElementById('doubts-counter').innerText = doubtsRemaining;

                if (doubtsRemaining <= 0) {
                    inputField.placeholder = "Doubt limit reached. Upgrade to Premium for 1000 doubts!";
                    inputField.disabled = true;
                } else {
                    inputField.disabled = false;
                    inputField.focus();
                }

            } catch (err) {
                const typingIndicator = document.getElementById('typing-indicator');
                if (typingIndicator) typingIndicator.remove();
                
                appendMessage('ai', "⚠️ Error: " + err.message);
                inputField.disabled = false;
                console.error(err);
            }
        }
        
        inputField.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!sendBtn.disabled) sendDoubt();
            }
        });
    </script>
    <script>
    function goBackToStory() {
        const returnUrl = localStorage.getItem('returnUrl');
        if (returnUrl) { window.location.href = returnUrl; } 
        else { window.location.href = "class8-dashboard.html"; }
    }
</script>
</body>
</html>
